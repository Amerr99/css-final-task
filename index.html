<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<link rel="stylesheet" href="index.css">
</head>

<body>

    <nav class="navbar">

        <div class="logo">Amer</div>


        <div class="nav-links" id="menu">

            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
            <button onclick="toggleDark()">🌙 Dark Mode</button>
        </div>

        <div class="hamburger">
            ☰
        </div>

    </nav>


    <div class="hero">
        <h1>Welcome</h1>
        <p>Learn Web Development</p>
    </div>

    <div class="about">

        <img src="cat.jpg" alt="About Image">

        <div class="about-text">
            <h2>About Me</h2>
            <p>
                I am a web developer learning HTML, CSS and JavaScript.
                I love building modern websites with clean design.
            </p>
        </div>
    </div>

    <section class="projects">

        <h2>My Projects</h2>

        <div class="grid">

            <div class="card red"></div>
            <div class="card blue"></div>
            <div class="card green"></div>
            <div class="card orange"></div>
            <div class="card purple"></div>

        </div>

    </section>

    <div class="contact">

        <h2>Contact</h2>

        <form>
            <input type="text" placeholder="Name">
            <input type="email" placeholder="Email">
            <textarea placeholder="Message"></textarea>
            <button>Send</button>
        </form>

</body>

<script>
    function toggleDark() {
        document.body.classList.toggle("dark");
    }
</script>

</html>
